name: go-skill-scanner CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.22"
  YARA_VERSION: "4.5.1"
  BINARY_SIZE_LIMIT_MB: 15

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1: Lint & Static Analysis
  # ────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install libyara (for CGO compilation in lint step)
        run: |
          sudo apt-get update
          sudo apt-get install -y libyara-dev

      - name: go vet
        run: CGO_ENABLED=1 go vet -tags yara_static ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m --build-tags yara_static

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2: Unit Tests (fast, no Docker)
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install libyara
        run: |
          sudo apt-get update
          sudo apt-get install -y libyara-dev

      - name: Run tests with race detector
        run: |
          CGO_ENABLED=1 go test \
            -tags yara_static \
            -race \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -timeout=120s \
            ./...

      - name: Check coverage threshold (minimum 70%)
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "❌ Coverage ${COVERAGE}% is below 70% threshold"
            exit 1
          fi
          echo "✓ Coverage ${COVERAGE}% passes threshold"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.out
          fail_ci_if_error: false

  # ────────────────────────────────────────────────────────────────────────────
  # Job 3: Docker Build & Binary Verification
  # This is the AUTHORITATIVE test of the static linking strategy.
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Static Binary Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (multi-stage)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/Dockerfile
          push: false
          load: true
          tags: go-skill-scanner:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract binary from image
        run: |
          docker create --name gss-extract go-skill-scanner:ci-${{ github.sha }}
          docker cp gss-extract:/go-skill-scanner ./go-skill-scanner
          docker rm gss-extract
          chmod +x ./go-skill-scanner

      - name: Verify static linking (THE PLUG-AND-PLAY TEST)
        run: |
          echo "=== ldd output ==="
          ldd ./go-skill-scanner || true
          
          # Fail the build if ldd finds any dynamic dependencies.
          if ldd ./go-skill-scanner 2>&1 | grep -qv "not a dynamic executable"; then
            echo "❌ FATAL: Binary has dynamic dependencies — plug-and-play contract broken"
            ldd ./go-skill-scanner
            exit 1
          fi
          echo "✓ Binary is fully static"

      - name: Verify binary size
        run: |
          SIZE=$(stat -c%s ./go-skill-scanner)
          SIZE_MB=$(( SIZE / 1024 / 1024 ))
          echo "Binary size: ${SIZE_MB}MB (${SIZE} bytes)"
          
          if [ "$SIZE_MB" -ge "${{ env.BINARY_SIZE_LIMIT_MB }}" ]; then
            echo "❌ Binary ${SIZE_MB}MB exceeds ${BINARY_SIZE_LIMIT_MB}MB architectural budget"
            exit 1
          fi
          echo "✓ Binary size ${SIZE_MB}MB within budget"

      - name: Smoke test — binary boots and responds
        run: |
          ./go-skill-scanner version
          echo '{"name":"smoke-test","payload":"aGVsbG8gd29ybGQ="}' | \
            ./go-skill-scanner scan --stdin --format json | \
            jq -e '.verdict.status' | \
            grep -q "CLEAN\|SUSPECT\|MALICIOUS"
          echo "✓ Binary boots and produces valid JSON output"

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-skill-scanner-linux-amd64-${{ github.sha }}
          path: ./go-skill-scanner
          retention-days: 30

  # ────────────────────────────────────────────────────────────────────────────
  # Job 4: Security Audit (the scanner scans itself)
  # ────────────────────────────────────────────────────────────────────────────
  self-scan:
    name: Self-Scan (Dogfooding)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: go-skill-scanner-linux-amd64-${{ github.sha }}

      - name: Make executable
        run: chmod +x ./go-skill-scanner

      - name: Scan own source code
        run: |
          find . -name "*.go" -not -path "*/vendor/*" | while read -r file; do
            echo "Scanning: $file"
            ./go-skill-scanner scan --file "$file" --format json | \
              jq -e 'select(.verdict.status == "MALICIOUS") | 
                     "❌ MALICIOUS finding in own source: " + .target.name + " — " + .verdict.summary' \
              && exit 1 || true
          done
          echo "✓ Self-scan clean — no malicious patterns in own codebase"

  # ────────────────────────────────────────────────────────────────────────────
  # Job 5: Release (main branch only)
  # ────────────────────────────────────────────────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build, self-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: version
        run: |
          VERSION=$(git describe --tags --always --dirty)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
